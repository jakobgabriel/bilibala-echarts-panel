name: Smoke

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci
      - run: npx eslint src
      - run: npm run typecheck
      - run: npm run test:ci
      - run: npm run build

      - name: Validate plugin (@grafana/plugin-validator)
        run: scripts/validate.sh dist

      - name: Upload built plugin
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  smoke:
    name: Grafana ${{ matrix.grafana }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        grafana:
          # renovate: datasource=docker depName=grafana/grafana
          - "11.6.14"
          # renovate: datasource=docker depName=grafana/grafana
          - "12.4.3"
          # renovate: datasource=docker depName=grafana/grafana
          - "13.0.1"
    steps:
      - uses: actions/checkout@v4

      - name: Download built plugin
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Run smoke test against grafana/grafana:${{ matrix.grafana }}
        run: scripts/smoke.sh "${{ matrix.grafana }}"

  smoke-informational:
    # Plugin's declared floor is Grafana 11. These EOL versions are kept
    # as a "does the build still happen to load?" signal only.
    # 10.x rejects aliasIDs in plugin.json and will fail; that's expected.
    name: Grafana ${{ matrix.grafana }} (informational)
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        grafana:
          - "8.5.27"
          - "9.5.21"
          - "10.4.19"
    steps:
      - uses: actions/checkout@v4

      - name: Download built plugin
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Run smoke test against grafana/grafana:${{ matrix.grafana }}
        run: scripts/smoke.sh "${{ matrix.grafana }}"
