name: Smoke

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Build + test + validate each ECharts variant in parallel. v5 has
    # no CI coverage outside the release pipeline otherwise; without
    # this matrix a v5-only regression (e.g. an ECharts API removal
    # the namespace shim doesn't catch) would only surface at tag-push
    # time. Same prep script as the release workflow uses.
    name: Build echarts${{ matrix.echarts }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        echarts: ["4", "5"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Pin ECharts ${{ matrix.echarts }} variant
        run: scripts/prep-variant.sh ${{ matrix.echarts }}

      - run: npm ci
      - run: npx eslint src
      - run: npm run typecheck
      - run: npm run test:ci
      - run: npm run build

      - name: Bundle size guardrail
        # Hard cap on dist/module.js so a future change can't silently
        # double the panel's load weight. Current baseline is ~2.3 MiB
        # (echarts core + echarts-gl/-liquidfill/-wordcloud + codemirror
        # + jshint). The cap leaves ~700 KiB of headroom; bump it
        # deliberately when adding a new add-on.
        run: |
          set -euo pipefail
          size=$(wc -c <dist/module.js | tr -d ' ')
          limit=$((3000 * 1024))
          echo "module.js size: ${size} bytes (limit ${limit})"
          if [ "$size" -gt "$limit" ]; then
            echo "::error ::dist/module.js (${size} B) exceeds ${limit} B"
            exit 1
          fi

      - name: Validate plugin (@grafana/plugin-validator)
        run: scripts/validate.sh dist

      - name: Upload built plugin
        uses: actions/upload-artifact@v4
        with:
          name: dist-echarts${{ matrix.echarts }}
          path: dist
          retention-days: 1

  smoke:
    name: Grafana ${{ matrix.grafana }} / echarts${{ matrix.echarts }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        grafana:
          # renovate: datasource=docker depName=grafana/grafana
          - "11.6.14"
          # renovate: datasource=docker depName=grafana/grafana
          - "12.4.3"
          # renovate: datasource=docker depName=grafana/grafana
          - "13.0.1"
        echarts: ["4", "5"]
    steps:
      - uses: actions/checkout@v4

      - name: Download echarts${{ matrix.echarts }} dist
        uses: actions/download-artifact@v4
        with:
          name: dist-echarts${{ matrix.echarts }}
          path: dist

      - name: Run smoke test against grafana/grafana:${{ matrix.grafana }}
        run: scripts/smoke.sh "${{ matrix.grafana }}"

  smoke-informational:
    # Plugin's declared floor is Grafana 11. These EOL versions are kept
    # as a "does the build still happen to load?" signal only. v4 only
    # — v5 add-on majors are unlikely to load on EOL Grafana hosts.
    name: Grafana ${{ matrix.grafana }} (informational, echarts4)
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        grafana:
          - "8.5.27"
          - "9.5.21"
          - "10.4.19"
    steps:
      - uses: actions/checkout@v4

      - name: Download echarts4 dist
        uses: actions/download-artifact@v4
        with:
          name: dist-echarts4
          path: dist

      - name: Run smoke test against grafana/grafana:${{ matrix.grafana }}
        run: scripts/smoke.sh "${{ matrix.grafana }}"
