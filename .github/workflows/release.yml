name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      # Allow the release to fire from the development branch when the
      # head commit is a `chore(release): vX.Y.Z` commit. The job-level
      # `if` below gates the actual publish so unrelated pushes to this
      # branch don't accidentally re-publish.
      - claude/echarts-grafana-13-upgrade-KBMct
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build echarts${{ matrix.echarts }}
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release):'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        echarts: ["4", "5"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci
      - run: npx eslint src
      - run: npm run typecheck
      - run: npm run test:ci
      - run: scripts/build-variant.sh ${{ matrix.echarts }}

      - name: Sign and re-package
        run: |
          # @grafana/sign-plugin signs dist/ in place; re-package after
          # so the variant zip contains the signed MANIFEST.txt.
          if [ -n "$GRAFANA_ACCESS_POLICY_TOKEN" ]; then
            npx --yes @grafana/sign-plugin@latest
          else
            echo "GRAFANA_ACCESS_POLICY_TOKEN not set; publishing unsigned variant zip."
          fi
          PLUGIN_ID=$(node -p "require('./dist/plugin.json').id")
          VERSION=$(node -p "require('./dist/plugin.json').info.version")
          ARTIFACT="${PLUGIN_ID}-${VERSION}-echarts${{ matrix.echarts }}.zip"
          rm -f "$ARTIFACT" "$ARTIFACT.sha256"
          rm -rf _pkg
          mkdir -p _pkg
          cp -r dist "_pkg/${PLUGIN_ID}"
          (cd _pkg && zip -qr "../${ARTIFACT}" "${PLUGIN_ID}")
          rm -rf _pkg
          sha256sum "$ARTIFACT" > "${ARTIFACT}.sha256"
        env:
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: zip-echarts${{ matrix.echarts }}
          path: |
            g-echarts-*-echarts${{ matrix.echarts }}.zip
            g-echarts-*-echarts${{ matrix.echarts }}.zip.sha256
          retention-days: 7

  release:
    name: Publish GitHub Release
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release):'))
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute release tag from package.json
        id: tag
        run: |
          # On a tag push, github.ref_name is already the tag.
          # Otherwise read the version from package.json.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Will publish release tag: ${TAG}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
