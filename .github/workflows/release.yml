name: Release

# Auto-release on every merge to master once Smoke is green and the
# version in package.json hasn't been released yet.
#
# Two trigger paths:
#   1. Smoke workflow completes successfully on master/main → this
#      workflow auto-fires. The `gate` job below checks whether the
#      package.json version matches an already-published tag; if not,
#      the build matrix runs and a draft release is published.
#   2. Manual `vX.Y.Z` tag push (or workflow_dispatch) → release runs
#      unconditionally. Used for emergency cuts or re-runs.
#
# Cutting a release becomes a normal PR flow:
#   1. Open a PR that bumps `package.json#version` (and updates
#      CHANGELOG).
#   2. Merge the PR to master.
#   3. Smoke runs on master, finishes green.
#   4. This workflow fires, sees the new version, builds + signs both
#      ECharts variants, and creates a draft GitHub Release.
#   5. The maintainer reviews the draft and clicks Publish.

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ['Smoke']
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write
  attestations: write
  actions: read

jobs:
  gate:
    # Decide whether this run should publish a release. Publishes when:
    #   - the trigger is a tag push (refs/tags/v*), or
    #   - the trigger is workflow_dispatch, or
    #   - the trigger is workflow_run with conclusion=success AND the
    #     package.json version doesn't already have a matching tag.
    name: Decide whether to release
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.gate.outputs.should-release }}
      tag: ${{ steps.gate.outputs.tag }}
      sha: ${{ steps.gate.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_run, GITHUB_SHA points at the workflow_run's
          # head, not master's HEAD. Check out that exact commit so
          # package.json reflects what Smoke just validated.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

          # Tag push: always release. Tag is github.ref_name.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "Trigger: tag push (${GITHUB_REF_NAME})"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # workflow_dispatch: always release. Tag from package.json.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION=$(node -p "require('./package.json').version")
            echo "Trigger: workflow_dispatch (v${VERSION})"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # workflow_run: only release if Smoke succeeded AND the
          # package.json version is new.
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          if [[ "$CONCLUSION" != "success" ]]; then
            echo "Trigger: workflow_run (Smoke conclusion=${CONCLUSION}) — skipping"
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "Trigger: workflow_run (Smoke succeeded on ${SHA}). Checking if ${TAG} is already released..."

          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/git/ref/tags/${TAG}")
          if [[ "$STATUS" == "200" ]]; then
            echo "Tag ${TAG} already exists — nothing to release."
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} missing — will release."
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build echarts${{ matrix.echarts }}
    needs: gate
    if: needs.gate.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        echarts: ["4", "5"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Pin ECharts ${{ matrix.echarts }} variant
        run: scripts/prep-variant.sh ${{ matrix.echarts }}

      - name: Sign + package via canonical Grafana action
        id: package
        uses: grafana/plugin-actions/package-plugin@main
        with:
          policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          node-version: "24"

      - name: Add -echarts${{ matrix.echarts }} suffix to artifacts
        id: rename
        run: |
          ORIG_ZIP="${{ steps.package.outputs.archive }}"
          ORIG_SHA="${{ steps.package.outputs.archive-sha1sum }}"
          PLUGIN_ID="${{ steps.package.outputs.plugin-id }}"
          VERSION="${{ steps.package.outputs.plugin-version }}"
          NEW_ZIP="${PLUGIN_ID}-${VERSION}-echarts${{ matrix.echarts }}.zip"
          NEW_SHA="${NEW_ZIP}.sha1"
          mv "$ORIG_ZIP" "$NEW_ZIP"
          mv "$ORIG_SHA" "$NEW_SHA"
          echo "archive=$NEW_ZIP"         >> "$GITHUB_OUTPUT"
          echo "archive-sha1sum=$NEW_SHA" >> "$GITHUB_OUTPUT"

      - name: Validate plugin (@grafana/plugin-validator)
        run: scripts/validate.sh "${{ steps.rename.outputs.archive }}"

      - name: Generate Sigstore attestation
        if: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.rename.outputs.archive }}

      - uses: actions/upload-artifact@v4
        with:
          name: zip-echarts${{ matrix.echarts }}
          path: |
            ${{ steps.rename.outputs.archive }}
            ${{ steps.rename.outputs.archive-sha1sum }}
          retention-days: 7

  release:
    name: Publish draft release
    needs: [gate, build]
    if: needs.gate.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - id: tag
        run: |
          TAG="${{ needs.gate.outputs.tag }}"
          echo "tag=${TAG}"           >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"     >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ needs.gate.outputs.sha }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true
          body: |
            **Draft release for catalog submission.**

            Two ECharts variants attached:

            | Variant | Asset | Best for |
            |---|---|---|
            | ECharts 4.9 | `community-echarts-panel-${{ steps.tag.outputs.version }}-echarts4.zip` | Direct upgrade from upstream `bilibala-echarts-panel`; existing v8.5.x dashboards |
            | ECharts 5.6 | `community-echarts-panel-${{ steps.tag.outputs.version }}-echarts5.zip` | New panels, modern ECharts API |

            Each comes with a `.sha1` sidecar suitable for the Grafana plugin catalog submission form. Sigstore build provenance attestations are generated when `GRAFANA_ACCESS_POLICY_TOKEN` is configured.

            ### To submit to the Grafana catalog

            1. Edit this draft release and click **Publish Release**.
            2. https://grafana.com/auth/sign-in → My Plugins → Submit New Plugin.
            3. Plugin URL: `https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/community-echarts-panel-${{ steps.tag.outputs.version }}-echarts5.zip`
            4. Source code URL: `https://github.com/${{ github.repository }}`
            5. SHA1: paste the contents of the `community-echarts-panel-${{ steps.tag.outputs.version }}-echarts5.zip.sha1` sidecar.
            6. Testing guidance: see the README's *Install* section.
