name: Release

# Auto-publish a GitHub Release on master merge when package.json's
# version is new. Releases are unsigned by default; set
# GRAFANA_ACCESS_POLICY_TOKEN as a repo secret later if you want signed
# plugins (the canonical package-plugin action picks it up
# automatically; nothing here changes).
#
# Triggers:
#   - push: branches: [master, main]  → fires on every master merge
#   - push: tags: ['v*']               → manual cuts via `git push --follow-tags`
#   - workflow_dispatch                → manual UI button (always publishes)
#
# Cutting a release:
#   1. PR bumps package.json#version (and CHANGELOG entry).
#   2. Merge to master.
#   3. This workflow auto-fires, builds + publishes both ECharts variants.
#   4. New release lands at /releases/latest/ — `wget`-able immediately.

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    # Decide whether this run should publish a release. Publishes when:
    #   - the trigger is a tag push (always), or
    #   - the trigger is workflow_dispatch (always), or
    #   - the trigger is a master push AND the package.json version
    #     doesn't already have a matching tag.
    name: Decide whether to release
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.gate.outputs.should-release }}
      tag: ${{ steps.gate.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # Tag push: always release.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "Trigger: tag push (${GITHUB_REF_NAME})"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "should-release=true"   >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          # workflow_dispatch: always release.
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "Trigger: workflow_dispatch (${TAG})"
            echo "tag=${TAG}"          >> "$GITHUB_OUTPUT"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # push to master/main: only release if the version is new.
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/git/ref/tags/${TAG}")
          if [[ "$STATUS" == "200" ]]; then
            echo "Tag ${TAG} already exists — nothing to release."
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} missing — will release."
            echo "tag=${TAG}"          >> "$GITHUB_OUTPUT"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build echarts${{ matrix.echarts }}
    needs: gate
    if: needs.gate.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        echarts: ["4", "5"]
    steps:
      - uses: actions/checkout@v4

      - name: Pin ECharts ${{ matrix.echarts }} variant
        run: scripts/prep-variant.sh ${{ matrix.echarts }}

      - name: Package via canonical Grafana action (unsigned when no token)
        # The action signs only if `policy_token` is non-empty. Passing
        # the secret as-is is safe even when the secret isn't set —
        # ${{ secrets.X }} resolves to '' and the action's internal
        # `if: inputs.policy_token != ''` skips the signing step.
        id: package
        uses: grafana/plugin-actions/package-plugin@main
        with:
          policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          node-version: "24"

      - name: Add -echarts${{ matrix.echarts }} suffix to artifacts
        id: rename
        run: |
          ORIG_ZIP="${{ steps.package.outputs.archive }}"
          ORIG_SHA="${{ steps.package.outputs.archive-sha1sum }}"
          PLUGIN_ID="${{ steps.package.outputs.plugin-id }}"
          VERSION="${{ steps.package.outputs.plugin-version }}"
          NEW_ZIP="${PLUGIN_ID}-${VERSION}-echarts${{ matrix.echarts }}.zip"
          NEW_SHA="${NEW_ZIP}.sha1"
          mv "$ORIG_ZIP" "$NEW_ZIP"
          mv "$ORIG_SHA" "$NEW_SHA"
          echo "archive=$NEW_ZIP"         >> "$GITHUB_OUTPUT"
          echo "archive-sha1sum=$NEW_SHA" >> "$GITHUB_OUTPUT"

      - name: Validate plugin (@grafana/plugin-validator)
        run: scripts/validate.sh "${{ steps.rename.outputs.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: zip-echarts${{ matrix.echarts }}
          path: |
            ${{ steps.rename.outputs.archive }}
            ${{ steps.rename.outputs.archive-sha1sum }}
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [gate, build]
    if: needs.gate.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: |
          TAG="${{ needs.gate.outputs.tag }}"
          echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage unversioned aliases for /releases/latest/download/
        # GitHub resolves /releases/latest/download/<asset> by asset name
        # against the release marked `latest`. With `make_latest: true`
        # every auto-release becomes the latest, so a wget against the
        # unversioned alias always pulls the newest published variant —
        # no URL bake-in for Dockerfiles or scripts.
        run: |
          set -euo pipefail
          cd artifacts
          V="${{ steps.tag.outputs.version }}"
          for n in 4 5; do
            cp "community-echarts-panel-${V}-echarts${n}.zip"      "community-echarts-panel-echarts${n}.zip"
            cp "community-echarts-panel-${V}-echarts${n}.zip.sha1" "community-echarts-panel-echarts${n}.zip.sha1"
          done
          ls -la

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          make_latest: 'true'
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true
          body: |
            **Auto-published release** (unsigned).

            Set `allow_loading_unsigned_plugins = community-echarts-panel`
            in `grafana.ini`, or pass
            `GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=community-echarts-panel`
            as an env var to your Grafana container.

            Two ECharts variants attached, each under both a versioned
            name (pinned) and an unversioned `latest` alias:

            | Variant | Versioned | Unversioned alias |
            |---|---|---|
            | ECharts 4.9 | `community-echarts-panel-${{ steps.tag.outputs.version }}-echarts4.zip` | `community-echarts-panel-echarts4.zip` |
            | ECharts 5.6 | `community-echarts-panel-${{ steps.tag.outputs.version }}-echarts5.zip` | `community-echarts-panel-echarts5.zip` |

            ### Quick install (always-latest)

            ```sh
            wget -qO /tmp/p.zip \
              https://github.com/${{ github.repository }}/releases/latest/download/community-echarts-panel-echarts5.zip \
              && sudo unzip -q /tmp/p.zip -d /var/lib/grafana/plugins \
              && rm /tmp/p.zip \
              && sudo systemctl restart grafana-server
            ```

            Swap `-echarts5` → `-echarts4` for the v4 variant.

            To turn on plugin signing: add `GRAFANA_ACCESS_POLICY_TOKEN`
            as a repo secret (https://grafana.com/orgs → Access policies
            → New, scope `plugins:write`). The next release picks it up
            automatically; no workflow change required.
